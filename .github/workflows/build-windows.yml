name: Build Windows App

on:
  # Build when you create a release
  release:
    types: [created]
  
  # Or manually trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install
        shell: bash

      - name: Build React app
        run: |
          cd frontend
          yarn build
        shell: bash
        env:
          CI: false
          REACT_APP_BACKEND_URL: https://poster-player.preview.emergentagent.com

      - name: Build Electron app
        run: |
          cd frontend
          yarn electron:build --publish never
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-cinema-windows-installer
          path: frontend/dist/*.exe
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
