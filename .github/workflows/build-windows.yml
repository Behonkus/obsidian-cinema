name: Build Windows App

on:
  # Build when you create a release
  release:
    types: [created]
  
  # Or manually trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build React app
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://your-app.emergentagent.com' }}
        run: yarn build

      - name: Build Electron app
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn electron:build --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-cinema-windows-installer
          path: |
            frontend/dist/*.exe
            frontend/dist/*.exe.blockmap
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

