name: Build Windows App

on:
  # Build when you create a release
  release:
    types: [created]
  
  # Or manually trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile
        shell: bash

      - name: Build React app
        run: |
          cd frontend
          yarn build
        shell: bash
        env:
          # CI=false prevents ESLint warnings from failing the build
          CI: false
          REACT_APP_BACKEND_URL: https://cinema-hub-402.emergent.host

      - name: Copy Electron files to build output
        run: |
          cd frontend
          REM Copy electron main process file
          copy electron.js build\electron.js
          REM Copy preload script directory
          xcopy electron build\electron\ /E /I /Y
        shell: cmd

      - name: Verify build output
        run: |
          cd frontend
          echo "=== Build directory ==="
          dir build\electron.js
          dir build\electron\preload.js
          echo "=== Verified: electron.js and preload.js present ==="
        shell: cmd

      - name: Build Electron installer
        run: |
          cd frontend
          npx electron-builder --win --publish never
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-cinema-windows-installer
          path: frontend/dist/*.exe
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend/dist/*.exe
            frontend/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Obsidian Cinema v${{ github.event.inputs.version }}
          files: |
            frontend/dist/*.exe
            frontend/dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
