name: Build & Release Windows App

on:
  # Auto-build when you push to main (i.e., "Save to GitHub")
  push:
    branches: [main]

  # Or manually trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Read version from package.json
        id: version
        run: |
          $version = (Get-Content frontend/package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"
        shell: pwsh

      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile
        shell: bash

      - name: Build React app
        run: |
          cd frontend
          yarn build
        shell: bash
        env:
          CI: false
          REACT_APP_BACKEND_URL: https://www.obsidiancinema.com

      - name: Copy Electron files to build output
        run: |
          cd frontend
          copy electron.js build\electron.js
          xcopy electron build\electron\ /E /I /Y
        shell: cmd

      - name: Verify build output
        run: |
          cd frontend
          dir build\electron.js
          dir build\electron\preload.js
          echo "Verified: electron.js and preload.js present"
        shell: cmd

      - name: Build Electron installer and publish to GitHub Releases
        run: |
          cd frontend
          npx electron-builder --win --publish always
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip installer for easy sharing
        run: |
          cd frontend/dist
          powershell Compress-Archive -Path "*.exe" -DestinationPath "Obsidian-Cinema-Setup-v${{ steps.version.outputs.VERSION }}.zip"
        shell: cmd

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: frontend/dist/Obsidian-Cinema-Setup-v${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as build artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-cinema-v${{ steps.version.outputs.VERSION }}
          path: |
            frontend/dist/*.exe
            frontend/dist/*.zip
            frontend/dist/latest.yml
          retention-days: 30
